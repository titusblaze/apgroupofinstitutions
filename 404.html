<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>

    <script>
      (function () {
        var segmentCount = 1;
        var l = window.location;

        var newUrl =
          l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1 + segmentCount).join("/") +
          "/?/" +
          l.pathname.slice(1).split("/").slice(segmentCount).join("/") +
          (l.search ? "&" + l.search.slice(1) : "") +
          l.hash;

        sessionStorage.redirect = newUrl;
        window.location.replace(newUrl);
      })();
    </script>
  </head>

  <body>
    <h3 style="text-align:center; margin-top:50px;">
      Redirecting...
    </h3>
  </body>
</html>
